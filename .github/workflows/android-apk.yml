name: Build Android APK

# 手动触发（Actions 页点 Run），或 mobile/ 有改动时自动构建。
on:
  workflow_dispatch:
  push:
    branches: ["**"]
    paths:
      - "mobile/**"
      - ".github/workflows/android-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install mobile deps
        working-directory: mobile
        run: npm install --no-audit --no-fund

      - name: Expo prebuild (android)
        working-directory: mobile
        run: npx expo prebuild --platform android --no-install

      # release 构建：JS 已内嵌、独立可安装；Expo 模板默认用 debug 密钥给 release 签名，
      # 故无需额外 keystore，装上即可跑（仅供测试，不能上架 Google Play）。
      - name: Build release APK
        working-directory: mobile/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: avc-android-apk
          path: mobile/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
