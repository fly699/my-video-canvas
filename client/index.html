<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1, interactive-widget=resizes-content" />
    <title>AI Video Canvas</title>
    <link rel="icon" type="image/svg+xml" href="/chat-icon.svg" />
    <link rel="apple-touch-icon" href="/chat-icon.svg" />
    <link rel="manifest" href="/chat.webmanifest" />
    <meta name="theme-color" content="#15131c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <script>
    (function() {
      try {
        var t = localStorage.getItem("avc:theme") || localStorage.getItem("theme") || "dark";
        var valid = ["dark","dim","midnight","forest","rose","ocean","light","warm"];
        if (valid.indexOf(t) === -1) t = "dark";
        document.documentElement.setAttribute("data-theme", t);
        if (t !== "light" && t !== "warm") document.documentElement.classList.add("dark");
        var m = localStorage.getItem("avc:canvas-mode") || "professional";
        document.documentElement.setAttribute("data-canvas-mode", m === "creative" ? "creative" : "professional");
      } catch(e) {}
    })();
  </script>
  </head>

  <body>
    <!-- 内联启动骨架：React 挂载前（下载/解析大 bundle 期间、弱网、bundle 加载失败时）
         也始终有可见的加载动画——修「进画布白屏、连加载进度条都没有」。挂载后被 React 替换。 -->
    <div id="root">
      <div id="boot-splash" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#15131c;color:#8b87a0;font:13px/1.6 system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;">
        <img src="/chat-icon.svg" alt="" style="width:44px;height:44px;border-radius:12px;" />
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="width:14px;height:14px;border:2px solid #6d5ce0;border-top-color:transparent;border-radius:50%;display:inline-block;animation:boot-spin 0.8s linear infinite;"></span>
          正在加载应用…
        </div>
        <div id="boot-splash-hint" style="font-size:11px;color:#5f5b72;opacity:0;transition:opacity .4s;">网络较慢或刚更新过版本；若长时间停留，请强制刷新（Ctrl+Shift+R）</div>
        <style>@keyframes boot-spin{to{transform:rotate(360deg)}}</style>
        <script>setTimeout(function(){var h=document.getElementById("boot-splash-hint");if(h)h.style.opacity="1";},6000);</script>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Only inject the analytics script when the env vars were actually substituted at build time.
         In dev with VITE_ANALYTICS_ENDPOINT unset, the literal `%VITE_…%` placeholder remains and
         the browser would otherwise try to fetch `%VITE_ANALYTICS_ENDPOINT%/umami` and log a 400. -->
    <script>
      (function () {
        var endpoint = "%VITE_ANALYTICS_ENDPOINT%";
        if (/^https?:\/\//.test(endpoint)) {
          var s = document.createElement("script");
          s.defer = true;
          s.src = endpoint + "/umami";
          s.setAttribute("data-website-id", "%VITE_ANALYTICS_WEBSITE_ID%");
          document.head.appendChild(s);
        }
      })();
    </script>
  </body>

</html>
